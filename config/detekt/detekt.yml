config:
  validation: true
  # `Compose` is not part of detekt's bundled config, so config validation would reject the block
  # below as an unknown ruleset. The rules themselves still run — they come from the
  # io.nlopez.compose.rules:detekt plugin on the `detektPlugins` configuration.
  excludes:
    - "Compose"

complexity:
  TooManyFunctions:
    # The rule measures what a type asks of the code around it, so only what that code can call is
    # counted. A private helper exists because CyclomaticComplexMethod and LongMethod asked for it —
    # 86acb38 split RowBlocksState's gesture teardown and SampleViewModel.onEvent into exactly such
    # helpers, and every one of them pushed this count up. Counting them here would make the three
    # rules contradict each other. Class bulk is still guarded by LargeClass.
    ignorePrivate: true
    # A deprecated member is a forwarder to its replacement, scheduled for removal and carrying the
    # migration in its own annotation. It is not a responsibility the type still holds, and counting
    # it would penalise the deprecation cycle that keeps consumers compiling — the alternative being
    # to break them outright, which the rule has no business encouraging.
    ignoreDeprecated: true

  LongMethod:
    # A composable that lays out a panel is not the same kind of debt as a long piece of business
    # logic: its length is the layout it declares, and splitting it produces indirection rather than
    # smaller units. The rule stays on for everything else.
    ignoreAnnotated:
      - Composable
    # Scenario tests read as one block — build the table, run the gesture, assert the outcome.
    # Extracting the steps into helpers hides the very sequence the test exists to document.
    excludes:
      - "**/commonTest/**"
      - "**/test/**"

potential-bugs:
  InvalidRange:
    # An empty range is a bug everywhere except where it is the input under test. Both findings
    # here are `3..2` handed to a function that must reject it, with the rejection asserted — the
    # rule was reporting the assertion's own fixture. Scoped with the same glob pair as LongMethod
    # above, so this file keeps one definition of what a test source is.
    excludes:
      - "**/commonTest/**"
      - "**/test/**"

style:
  ReturnCount:
    # detekt counts every exit equally, but a leading guard clause is not an exit a reader has to
    # follow — it is the precondition, read once and done with before the body starts. `max` stays
    # at 2, so a function with three returns scattered through real branching is still reported.
    excludeGuardClauses: true

naming:
  FunctionNaming:
    active: true
    # Allow PascalCase for functions annotated with @Composable
    ignoreAnnotated:
      - Composable

# Compose rules (io.nlopez.compose.rules). Rules absent from this block still run with the defaults
# bundled in the ruleset jar, because `buildUponDefaultConfig = true`.
Compose:
  ComposableNaming:
    active: true
  ComposableParamOrder:
    active: true
  CompositionLocalAllowlist:
    active: true
    # Every CompositionLocal in the library. New ones need a deliberate entry here — that is the
    # point of the rule: they are invisible dependencies in a public API.
    allowedCompositionLocals:
      - LocalStringProvider
      - LocalTableState
      - LocalTableHeaderCellInfo
      - LocalTableHeaderIcons
      - LocalEditCellContext
      - LocalEditCellFocusRequester
  CompositionLocalNaming:
    active: true
  ContentEmitterReturningValues:
    active: true
  ContentSlotReused:
    active: true
  ContentTrailingLambda:
    active: true
  DefaultsVisibility:
    active: true
  LambdaParameterEventTrailing:
    active: true
  LambdaParameterInRestartableEffect:
    active: true
  ModifierClickableOrder:
    active: true
  ModifierComposed:
    active: true
  ModifierMissing:
    active: true
    checkModifiersForVisibility: only_public
  ModifierNaming:
    active: true
  ModifierNotUsedAtRoot:
    active: true
  ModifierReused:
    active: true
  ModifierWithoutDefault:
    active: true
  MultipleEmitters:
    active: true
  MutableParams:
    active: true
  MutableStateAutoboxing:
    active: true
  MutableStateParam:
    active: true
  ParameterNaming:
    active: true
  PreviewAnnotationNaming:
    active: true
  PreviewPublic:
    active: true
  RememberContentMissing:
    active: true
  RememberMissing:
    active: true
  ViewModelForwarding:
    active: true
  ViewModelInjection:
    active: true
